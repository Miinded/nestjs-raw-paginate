name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - alpha
          - beta
          - rc

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    services:
      mariadb:
        image: mariadb:10.5
        env:
          MARIADB_ROOT_PASSWORD: rawpaginate
          MARIADB_DATABASE: rawpaginate
          MARIADB_USER: rawpaginate
          MARIADB_PASSWORD: rawpaginate
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      MARIA_DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: rawpaginate
      DB_DATABASE: rawpaginate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        run: corepack prepare pnpm@10.32.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate
        run: pnpm ci:quality

      - name: Enter prerelease mode
        if: github.event.inputs.type != 'stable' && github.event.inputs.type != ''
        run: pnpm changeset pre enter ${{ github.event.inputs.type }}

      - name: Exit prerelease mode
        if: github.event.inputs.type == 'stable'
        run: pnpm changeset pre exit || true

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore: release'
          title: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
