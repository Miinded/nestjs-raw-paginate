name: Feature Request
description: Suggest a new feature or improvement.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please describe your idea so we can evaluate and discuss it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What limitation are you hitting?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution or API you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.
    validations:
      required: false

  - type: input
    id: nestjs-version
    attributes:
      label: NestJS version
      description: Run `pnpm ls @nestjs/core` or check your `package.json`.
      placeholder: e.g. 11.1.0
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information, code samples, or references that support this request.
    validations:
      required: false
