services:
  bdd:
    image: mariadb:10.5
    ports:
      - ${BDD_PORT:-3800}:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${BDD_PASSWORD:-rawpaginate}
      MYSQL_DATABASE: ${BDD_DATABASE:-rawpaginate}
      MYSQL_USER: ${BDD_USERNAME:-rawpaginate}
      MYSQL_PASSWORD: ${BDD_PASSWORD:-rawpaginate}
    volumes:
      - database:/var/lib/mysql2
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']

volumes:
  database: ~
